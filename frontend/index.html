<!DOCTYPE html>
<html>

<head>

<title>AI Video Dubbing</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>🎬 AI Video Dubbing</h1>


<input 
type="file"
id="videoFile"
accept="video/*"
/>


<br><br>


<select id="language">

<option>Hindi</option>
<option>English</option>
<option>German</option>
<option>French</option>

</select>


<br><br>


<button onclick="uploadVideo()">

🚀 Start Dubbing

</button>



<h3 id="status">

Waiting...

</h3>



<progress 
id="progress"
value="0"
max="100">
</progress>

<span id="percent">
0%
</span>



<br><br>


<a

id="download"

style="display:none">

Download Video

</a>



</div>



<script src="script.js"></script>


</body>

</html>
